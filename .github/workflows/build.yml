name: luci-app-substore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 zstd

      - name: Download OpenWrt SDK (IPK)
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Download OpenWrt SDK (APK)
        run: |
          SDK_FILE=$(wget -qO- https://downloads.openwrt.org/snapshots/targets/x86/64/sha256sums | grep -o "openwrt-sdk-.*\.tar\.zst" | head -n 1)
          wget -q "https://downloads.openwrt.org/snapshots/targets/x86/64/$SDK_FILE" -O sdk-apk.tar.zst
          tar -xf sdk-apk.tar.zst
          FOLDER_NAME="${SDK_FILE%.tar.zst}"
          mv "$FOLDER_NAME" openwrt-sdk-apk

      - name: Setup feeds (IPK)
        run: |
          cd openwrt-sdk
          ./scripts/feeds update luci
          ./scripts/feeds install -a -p luci

      - name: Setup feeds (APK)
        run: |
          cd openwrt-sdk-apk
          ./scripts/feeds update luci
          ./scripts/feeds install -a -p luci

      - name: Download Sub-Store backend and frontend
        run: |
          mkdir -p src/root/usr/libexec/substore
          mkdir -p src/root/www/sub-store

          wget -q -O src/root/usr/libexec/substore/sub-store.bundle.js \
            https://github.com/sub-store-org/Sub-Store/releases/latest/download/sub-store.bundle.js

          wget -q -O /tmp/dist.zip \
            https://github.com/sub-store-org/Sub-Store-Front-End/releases/latest/download/dist.zip

          unzip -q /tmp/dist.zip -d src/root/www/sub-store

      - name: Copy package (IPK)
        run: |
          cp -r src openwrt-sdk/package/luci-app-substore

      - name: Copy package (APK)
        run: |
          cp -r src openwrt-sdk-apk/package/luci-app-substore

      - name: Build IPK
        run: |
          cd openwrt-sdk
          make defconfig
          make package/luci-app-substore/compile V=s

      - name: Build APK
        run: |
          cd openwrt-sdk-apk
          make defconfig
          make package/luci-app-substore/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p output

          find openwrt-sdk/bin/ -name "luci-app-substore*.ipk" -exec cp {} output/ \;
          find openwrt-sdk-apk/bin/ -name "luci-app-substore*.apk" -exec cp {} output/ \;

          ls -lh output/

          name: luci-app-substore-all
          path: output/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: luci-app-substore
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
